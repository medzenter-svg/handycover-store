name: Deploy Handycover to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "35 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create complete static copy from live site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist mirror
          mkdir -p dist mirror

          wget --mirror --page-requisites --convert-links --adjust-extension --no-parent \
            --execute robots=off https://handycover.com/ -P mirror || true

          if [ -d mirror/handycover.com ]; then
            cp -R mirror/handycover.com/. dist/
          fi

          if [ ! -f dist/index.html ]; then
            curl -L --fail https://handycover.com/ -o dist/index.html
          fi

          python3 - <<'PY'
          from pathlib import Path
          import re
          import urllib.request
          import urllib.parse

          root = Path('dist')
          origin = 'https://handycover.com'
          patterns = [
              re.compile(r'''["'](/assets/[^"'?#]+\.(?:js|css|map))["']'''),
              re.compile(r'''["'](\./[^"'?#]+\.(?:js|css|map))["']'''),
          ]

          def fetch(url_path, relative_to=None):
              if url_path.startswith('./') and relative_to is not None:
                  target = (relative_to.parent / url_path).resolve()
                  try:
                      rel = target.relative_to(root.resolve())
                  except ValueError:
                      return False
                  web_path = '/' + rel.as_posix()
              else:
                  web_path = url_path
                  rel = Path(web_path.lstrip('/'))
                  target = root / rel

              if target.exists() and target.stat().st_size > 0:
                  return False

              target.parent.mkdir(parents=True, exist_ok=True)
              url = origin + urllib.parse.quote(web_path, safe='/%:@')
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=30) as response:
                      data = response.read()
                  target.write_bytes(data)
                  print('downloaded', web_path)
                  return True
              except Exception as exc:
                  print('failed', web_path, exc)
                  if target.exists():
                      target.unlink()
                  return False

          for _ in range(12):
              changed = False
              files = list(root.rglob('*.html')) + list(root.rglob('*.js')) + list(root.rglob('*.css'))
              for file in files:
                  text = file.read_text(encoding='utf-8', errors='ignore')
                  for pattern in patterns:
                      for match in pattern.findall(text):
                          changed |= fetch(match, file)
              if not changed:
                  break
          PY

          find dist -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \) -print0 \
            | xargs -0 sed -i \
              -e 's|http://handycover\.store|https://handycover.store|g' \
              -e 's|http://www\.handycover\.store|https://www.handycover.store|g' \
              -e 's|http://handycover\.com|https://handycover.com|g' \
              -e 's|http://www\.handycover\.com|https://www.handycover.com|g'

          cat > dist/sitemap.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://handycover.store/</loc>
              <changefreq>weekly</changefreq>
              <priority>1.0</priority>
            </url>
          </urlset>
          EOF

          cat > dist/robots.txt <<'EOF'
          User-agent: *
          Allow: /

          Sitemap: https://handycover.store/sitemap.xml
          EOF

          echo "handycover.store" > dist/CNAME
          cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4