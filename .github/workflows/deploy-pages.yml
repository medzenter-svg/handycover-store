name: Deploy Handycover Store to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "35 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout store repository
        uses: actions/checkout@v4

      - name: Create independent themed copy for handycover.store
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist mirror
          mkdir -p dist mirror

          wget --mirror --page-requisites --convert-links --adjust-extension --no-parent \
            --execute robots=off https://handycover.com/ -P mirror || true

          if [ -d mirror/handycover.com ]; then
            cp -R mirror/handycover.com/. dist/
          fi

          if [ ! -f dist/index.html ]; then
            curl -L --fail https://handycover.com/ -o dist/index.html
          fi

          python3 - <<'PY'
          from pathlib import Path
          import re
          import urllib.request
          import urllib.parse

          root = Path('dist')
          origin = 'https://handycover.com'
          patterns = [
              re.compile(r'''["'](/assets/[^"'?#]+\.(?:js|css|map))["']'''),
              re.compile(r'''["'](\./[^"'?#]+\.(?:js|css|map))["']'''),
          ]

          def fetch(url_path, relative_to=None):
              if url_path.startswith('./') and relative_to is not None:
                  target = (relative_to.parent / url_path).resolve()
                  try:
                      rel = target.relative_to(root.resolve())
                  except ValueError:
                      return False
                  web_path = '/' + rel.as_posix()
              else:
                  web_path = url_path
                  rel = Path(web_path.lstrip('/'))
                  target = root / rel
              if target.exists() and target.stat().st_size > 0:
                  return False
              target.parent.mkdir(parents=True, exist_ok=True)
              url = origin + urllib.parse.quote(web_path, safe='/%:@')
              try:
                  req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=30) as response:
                      target.write_bytes(response.read())
                  return True
              except Exception:
                  if target.exists(): target.unlink()
                  return False

          for _ in range(12):
              changed = False
              files = list(root.rglob('*.html')) + list(root.rglob('*.js')) + list(root.rglob('*.css'))
              for file in files:
                  text = file.read_text(encoding='utf-8', errors='ignore')
                  for pattern in patterns:
                      for match in pattern.findall(text):
                          changed |= fetch(match, file)
              if not changed:
                  break
          PY

          cp store-theme.css dist/store-theme.css
          cp store-enhance.js dist/store-enhance.js

          # Add pages created specifically for handycover.store.
          if [ -d ratgeber ]; then
            rm -rf dist/ratgeber
            cp -R ratgeber dist/ratgeber
          fi

          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('dist')
          urls = []
          for file in root.rglob('*.html'):
              text = file.read_text(encoding='utf-8', errors='ignore')
              text = text.replace('https://www.handycover.com', 'https://handycover.store')
              text = text.replace('https://handycover.com', 'https://handycover.store')
              text = text.replace('http://www.handycover.com', 'https://handycover.store')
              text = text.replace('http://handycover.com', 'https://handycover.store')
              text = re.sub(r'<link[^>]+rel=["\']canonical["\'][^>]*>', '', text, flags=re.I)
              inject = '<link rel="stylesheet" href="/store-theme.css"><script defer src="/store-enhance.js"></script>'
              canonical_path = '/' if file.name == 'index.html' and file.parent == root else '/' + file.relative_to(root).as_posix().replace('index.html','')
              canonical = f'<link rel="canonical" href="https://handycover.store{canonical_path}">'
              if '/store-theme.css' not in text:
                  if '</head>' in text:
                      text = text.replace('</head>', canonical + inject + '</head>', 1)
                  else:
                      text = canonical + inject + text
              else:
                  if '</head>' in text:
                      text = text.replace('</head>', canonical + '</head>', 1)
                  else:
                      text = canonical + text
              file.write_text(text, encoding='utf-8')
              if file.name == 'index.html':
                  urls.append('https://handycover.store' + canonical_path)

          urls = sorted(set(urls))
          sitemap = ['<?xml version="1.0" encoding="UTF-8"?>','<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">']
          for url in urls:
              sitemap += ['  <url>', f'    <loc>{url}</loc>', '    <changefreq>weekly</changefreq>', '  </url>']
          sitemap.append('</urlset>')
          (root/'sitemap.xml').write_text('\n'.join(sitemap)+'\n', encoding='utf-8')
          (root/'robots.txt').write_text('User-agent: *\nAllow: /\n\nSitemap: https://handycover.store/sitemap.xml\n', encoding='utf-8')
          PY

          pip install --quiet beautifulsoup4

          python3 - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup
          import json
          import re

          root = Path('dist')
          price_re = re.compile(r'(\d{1,4}(?:\.\d{3})*,\d{2})\s*€')

          def to_number(price_str):
              return price_str.replace('.', '').replace(',', '.')

          for file in root.rglob('*.html'):
              html = file.read_text(encoding='utf-8', errors='ignore')
              if '</head>' not in html:
                  continue
              soup = BeautifulSoup(html, 'html.parser')
              products = []
              seen = set()
              for a in soup.find_all('a', href=True):
                  img = a.find('img')
                  if not img or not img.get('alt'):
                      continue
                  text = a.get_text(' ', strip=True)
                  m = price_re.search(text)
                  if not m:
                      continue
                  name = img.get('alt').strip()
                  key = (name, m.group(1))
                  if not name or key in seen:
                      continue
                  seen.add(key)
                  src = img.get('src') or ''
                  if src.startswith('http'):
                      image_url = src
                  else:
                      image_url = 'https://handycover.store/' + src.lstrip('/')
                  href = a.get('href')
                  products.append({
                      '@type': 'Product',
                      'name': name,
                      'image': image_url,
                      'offers': {
                          '@type': 'Offer',
                          'price': to_number(m.group(1)),
                          'priceCurrency': 'EUR',
                          'availability': 'https://schema.org/InStock',
                          'url': href,
                      },
                  })
              if not products:
                  continue
              graph = {'@context': 'https://schema.org', '@graph': products}
              script_tag = '<script type="application/ld+json">' + json.dumps(graph, ensure_ascii=False) + '</script>'
              html = html.replace('</head>', script_tag + '</head>', 1)
              file.write_text(html, encoding='utf-8')
          PY

          echo "handycover.store" > dist/CNAME
          cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
