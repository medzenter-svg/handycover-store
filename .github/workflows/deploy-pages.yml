name: Deploy Handycover to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "35 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create complete static copy from live site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist mirror
          mkdir -p dist mirror

          wget --mirror --page-requisites --convert-links --adjust-extension --no-parent --execute robots=off https://handycover.com/ -P mirror || true

          if [ -d mirror/handycover.com ]; then
            cp -R mirror/handycover.com/. dist/
          fi

          if [ ! -f dist/index.html ]; then
            curl -L --fail https://handycover.com/ -o dist/index.html
          fi

          python3 - <<'PY'
from pathlib import Path
import re, urllib.request, urllib.parse
root = Path('dist')
origin = 'https://handycover.com'
patterns=[re.compile(r'''["'](/assets/[^"'?#]+\.(?:js|css|map))["']'''),re.compile(r'''["'](\./[^"'?#]+\.(?:js|css|map))["']''')]

def fetch(p,rel=None):
    if p.startswith('./') and rel is not None:
        target=(rel.parent/p).resolve()
        try: r=target.relative_to(root.resolve())
        except: return False
        web='/' + r.as_posix()
    else:
        web=p; target=root/Path(web.lstrip('/'))
    if target.exists() and target.stat().st_size>0: return False
    target.parent.mkdir(parents=True,exist_ok=True)
    try:
        with urllib.request.urlopen(origin+urllib.parse.quote(web,safe='/%:@')) as x:
            target.write_bytes(x.read())
        return True
    except:
        return False
for _ in range(12):
    changed=False
    for f in list(root.rglob('*.html'))+list(root.rglob('*.js'))+list(root.rglob('*.css')):
        txt=f.read_text(encoding='utf-8',errors='ignore')
        for pat in patterns:
            for m in pat.findall(txt):
                changed |= fetch(m,f)
    if not changed: break
PY

          find dist -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \) -print0 | xargs -0 sed -i -e 's|http://handycover\.com|https://handycover.com|g'

          echo "handycover.store" > dist/CNAME
          cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4