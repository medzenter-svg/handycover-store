name: Deploy Handycover to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "35 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create static copy from live site
        shell: bash
        run: |
          set -e
          rm -rf dist mirror
          mkdir -p dist mirror
          wget --mirror --page-requisites --convert-links --adjust-extension --no-parent --execute robots=off https://handycover.com/ -P mirror || true
          if [ -d mirror/handycover.com ]; then
            cp -R mirror/handycover.com/. dist/
          fi
          if [ ! -f dist/index.html ]; then
            curl -L --fail https://handycover.com/ -o dist/index.html
          fi
          echo "handycover.store" > dist/CNAME
          cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
