name: Deploy Handycover Store to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "35 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout store repository
        uses: actions/checkout@v4

      - name: Create independent themed copy for handycover.store
        shell: bash
        run: |
          set -euo pipefail
          rm -